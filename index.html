<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>レーザーパターン一覧</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: #0d0e11;
      color: #ffffff;
      font-family:
        -apple-system,
        BlinkMacSystemFont,
        "Segoe UI",
        "Yu Gothic",
        "Meiryo",
        sans-serif;
    }

    header {
      position: sticky;
      top: 0;
      z-index: 20;
      padding: 14px 16px;
      background: rgba(13, 14, 17, 0.95);
      border-bottom: 1px solid #34363c;
      text-align: center;
      backdrop-filter: blur(8px);
    }

    header h1 {
      margin: 0;
      font-size: 21px;
      letter-spacing: 0.5px;
    }

    header p {
      margin: 6px 0 0;
      color: #b8bbc3;
      font-size: 12px;
    }

    main {
      width: min(100%, 1100px);
      margin: 0 auto;
      padding: 18px 14px 50px;
    }

    .genre {
      margin-bottom: 38px;
    }

    .genre-title {
      margin: 0 0 14px;
      padding-left: 10px;
      border-left: 5px solid #ffffff;
      font-size: 19px;
    }

    .pattern-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .pattern-card {
      padding: 0;
      overflow: hidden;
      background: #202226;
      color: #ffffff;
      border: 1px solid #363941;
      border-radius: 11px;
      cursor: pointer;
      text-align: left;
      -webkit-tap-highlight-color: transparent;
      transition:
        transform 0.15s ease,
        border-color 0.15s ease;
    }

    .pattern-card:active {
      transform: scale(0.98);
    }

    .pattern-card:hover {
      border-color: #727782;
    }

    .media-area {
      position: relative;
      width: 100%;
      aspect-ratio: 16 / 9;
      overflow: hidden;
      background: #000000;
    }

    .preview-video {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: cover;
      background: #000000;
    }

    .preview-status {
      position: absolute;
      top: 8px;
      right: 8px;
      padding: 4px 7px;
      background: rgba(0, 0, 0, 0.72);
      color: #ffffff;
      border-radius: 5px;
      font-size: 10px;
      pointer-events: none;
    }

    .pattern-card.is-playing .preview-status {
      background: rgba(255, 255, 255, 0.9);
      color: #111111;
    }

    .tap-mark {
      position: absolute;
      left: 8px;
      bottom: 8px;
      padding: 5px 8px;
      background: rgba(0, 0, 0, 0.7);
      border-radius: 5px;
      color: #ffffff;
      font-size: 10px;
      pointer-events: none;
    }

    .pattern-info {
      padding: 10px 11px 12px;
    }

    .pattern-title {
      margin: 0 0 5px;
      font-size: 15px;
      font-weight: 700;
    }

    .dmx-value {
      margin: 0;
      color: #c5c8d0;
      font-size: 12px;
    }

    dialog {
      width: min(94%, 850px);
      max-width: 850px;
      padding: 0;
      overflow: hidden;
      background: #17191d;
      color: #ffffff;
      border: 1px solid #555b66;
      border-radius: 13px;
    }

    dialog::backdrop {
      background: rgba(0, 0, 0, 0.9);
    }

    .player-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 12px 14px;
    }

    .player-header h3 {
      margin: 0;
      font-size: 17px;
    }

    .close-button {
      flex: 0 0 auto;
      width: 40px;
      height: 40px;
      padding: 0;
      background: #33363d;
      color: #ffffff;
      border: none;
      border-radius: 50%;
      font-size: 23px;
      cursor: pointer;
    }

    #largeVideo {
      display: block;
      width: 100%;
      max-height: 72vh;
      background: #000000;
    }

    .player-details {
      padding: 12px 14px 17px;
      color: #d4d6dc;
      font-size: 14px;
      line-height: 1.6;
    }

    @media (min-width: 700px) {
      main {
        padding-right: 20px;
        padding-left: 20px;
      }

      .pattern-grid {
        grid-template-columns: repeat(4, minmax(0, 1fr));
      }
    }
  </style>
</head>

<body>

  <header>
    <h1>LASER PATTERN LIBRARY</h1>
    <p>
      画面内の動画だけ自動再生します。
      タップすると拡大再生します。
    </p>
  </header>

  <main id="patternList"></main>

  <dialog id="videoDialog">

    <div class="player-header">
      <h3 id="largeTitle">パターン</h3>

      <button
        type="button"
        class="close-button"
        id="closeButton"
        aria-label="閉じる"
      >
        ×
      </button>
    </div>

    <video
      id="largeVideo"
      controls
      muted
      playsinline
      preload="metadata"
    ></video>

    <div
      class="player-details"
      id="largeDetails"
    ></div>

  </dialog>

  <script>
    /*
      最初はtest.mp4とtest.jpgを使って動作確認します。

      同じ動画を複数登録しているのは、
      スクロール時の自動再生・停止を
      確認しやすくするためです。
    */

    const patterns = [
      {
        genre: "ジャンル1",
        title: "テストパターン01",
        dmx: "DMX値：0～9",
        video: "test.mp4",
        thumbnail: "test.jpg"
      },
      {
        genre: "ジャンル1",
        title: "テストパターン02",
        dmx: "DMX値：10～19",
        video: "test2.mp4",
      },
      {
        genre: "ジャンル1",
        title: "テストパターン03",
        dmx: "DMX値：20～29",
        video: "test3.mp4",
      },
      {
        genre: "ジャンル1",
        title: "テストパターン04",
        dmx: "DMX値：30～39",
        video: "test4.mp4",
      },
      {
        genre: "ジャンル2",
        title: "テストパターン05",
        dmx: "DMX値：40～49",
        video: "test.mp4",
        thumbnail: "test.jpg"
      },
      {
        genre: "ジャンル2",
        title: "テストパターン06",
        dmx: "DMX値：50～59",
        video: "test.mp4",
        thumbnail: "test.jpg"
      },
      {
        genre: "ジャンル2",
        title: "テストパターン07",
        dmx: "DMX値：60～69",
        video: "test.mp4",
        thumbnail: "test.jpg"
      },
      {
        genre: "ジャンル2",
        title: "テストパターン08",
        dmx: "DMX値：70～79",
        video: "test.mp4",
        thumbnail: "test.jpg"
      }
    ];

    const patternList =
      document.getElementById("patternList");

    const videoDialog =
      document.getElementById("videoDialog");

    const largeVideo =
      document.getElementById("largeVideo");

    const largeTitle =
      document.getElementById("largeTitle");

    const largeDetails =
      document.getElementById("largeDetails");

    const closeButton =
      document.getElementById("closeButton");

    /*
      画面内にどの程度入ったら
      再生するかを設定します。

      threshold: 0.5
      動画の50%以上が画面に入ったら再生
    */

    const observerOptions = {
      root: null,
      rootMargin: "150px 0px 150px 0px",
      threshold: 0.5
    };

    const videoObserver =
      new IntersectionObserver(
        handleIntersection,
        observerOptions
      );

    /*
      ジャンルごとに一覧を作ります。
    */

    const genres = [
      ...new Set(
        patterns.map(pattern => pattern.genre)
      )
    ];

    genres.forEach(genreName => {
      const section =
        document.createElement("section");

      section.className = "genre";

      const heading =
        document.createElement("h2");

      heading.className = "genre-title";
      heading.textContent = genreName;

      const grid =
        document.createElement("div");

      grid.className = "pattern-grid";

      patterns
        .filter(
          pattern =>
            pattern.genre === genreName
        )
        .forEach(pattern => {
          const card =
            createPatternCard(pattern);

          grid.appendChild(card);
        });

      section.appendChild(heading);
      section.appendChild(grid);
      patternList.appendChild(section);
    });

    function createPatternCard(pattern) {
      const card =
        document.createElement("article");

      card.className = "pattern-card";
      card.tabIndex = 0;

      const mediaArea =
        document.createElement("div");

      mediaArea.className = "media-area";

      const previewVideo =
        document.createElement("video");

      previewVideo.className = "preview-video";

      /*
        data-srcに動画ファイルを入れます。

        最初からsrcへ設定しないことで、
        50本すべての動画を一度に
        読み込まないようにしています。
      */

      previewVideo.dataset.src = pattern.video;

      previewVideo.poster = pattern.thumbnail;
      previewVideo.muted = true;
      previewVideo.loop = true;
      previewVideo.playsInline = true;
      previewVideo.preload = "none";

      previewVideo.setAttribute("muted", "");
      previewVideo.setAttribute("playsinline", "");
      previewVideo.setAttribute(
        "webkit-playsinline",
        ""
      );

      /*
        Intersection Observerから
        カードを取得できるようにします。
      */

      previewVideo.cardElement = card;

      const previewStatus =
        document.createElement("div");

      previewStatus.className =
        "preview-status";

      previewStatus.textContent =
        "AUTO PREVIEW";

      const tapMark =
        document.createElement("div");

      tapMark.className = "tap-mark";
      tapMark.textContent =
        "タップで拡大";

      mediaArea.appendChild(previewVideo);
      mediaArea.appendChild(previewStatus);
      mediaArea.appendChild(tapMark);

      const info =
        document.createElement("div");

      info.className = "pattern-info";

      const title =
        document.createElement("p");

      title.className = "pattern-title";
      title.textContent = pattern.title;

      const dmx =
        document.createElement("p");

      dmx.className = "dmx-value";
      dmx.textContent = pattern.dmx;

      info.appendChild(title);
      info.appendChild(dmx);

      card.appendChild(mediaArea);
      card.appendChild(info);

      /*
        カードをタップ・クリックすると
        大きな動画を開きます。
      */

      card.addEventListener(
        "click",
        () => {
          openLargeVideo(pattern);
        }
      );

      card.addEventListener(
        "keydown",
        event => {
          if (
            event.key === "Enter" ||
            event.key === " "
          ) {
            event.preventDefault();
            openLargeVideo(pattern);
          }
        }
      );

      /*
        この動画を監視対象に登録します。
      */

      videoObserver.observe(previewVideo);

      return card;
    }

    /*
      動画が画面内へ入ったとき、
      画面外へ出たときの処理です。
    */

    function handleIntersection(entries) {
      entries.forEach(entry => {
        const video = entry.target;
        const card = video.cardElement;

        if (
          entry.isIntersecting &&
          entry.intersectionRatio >= 0.5
        ) {
          startPreview(video, card);
        } else {
          stopPreview(video, card);
        }
      });
    }

    /*
      プレビュー再生
    */

    function startPreview(video, card) {
      /*
        まだ動画を読み込んでいなければ、
        data-srcからsrcへ移します。
      */

      if (!video.src) {
        video.src = video.dataset.src;
        video.load();
      }

      card.classList.add("is-playing");

      const playPromise = video.play();

      if (
        playPromise !== undefined
      ) {
        playPromise.catch(error => {
          /*
            ブラウザの設定で自動再生が
            制限された場合は、
            サムネイル画像のままになります。
          */

          console.log(
            "プレビュー自動再生が制限されました。",
            error
          );

          card.classList.remove(
            "is-playing"
          );
        });
      }
    }

    /*
      プレビュー停止
    */

    function stopPreview(video, card) {
      video.pause();

      /*
        再び画面内に入った際、
        動画の先頭から再生します。
      */

      try {
        video.currentTime = 0;
      } catch (error) {
        console.log(error);
      }

      card.classList.remove("is-playing");
    }

    /*
      拡大動画を開く処理
    */

    function openLargeVideo(pattern) {
      pauseAllPreviewVideos();

      largeTitle.textContent =
        `${pattern.genre}　${pattern.title}`;

      largeDetails.textContent =
        pattern.dmx;

      largeVideo.src = pattern.video;
      largeVideo.muted = true;

      videoDialog.showModal();

      largeVideo.play().catch(error => {
        /*
          再生できなかった場合は、
          再生ボタンをタップしてください。
        */

        console.log(
          "拡大動画の自動再生が制限されました。",
          error
        );
      });
    }

    /*
      拡大表示中は、
      背景側のプレビューを停止します。
    */

    function pauseAllPreviewVideos() {
      const previewVideos =
        document.querySelectorAll(
          ".preview-video"
        );

      previewVideos.forEach(video => {
        video.pause();

        if (video.cardElement) {
          video.cardElement.classList.remove(
            "is-playing"
          );
        }
      });
    }

    /*
      拡大動画を閉じる処理
    */

    function closeLargeVideo() {
      largeVideo.pause();
      largeVideo.removeAttribute("src");
      largeVideo.load();

      if (videoDialog.open) {
        videoDialog.close();
      }

      /*
        ダイアログを閉じた後、
        画面内のプレビュー動画を
        再確認します。
      */

      restartVisibleVideos();
    }

    /*
      現在画面内にある動画を
      再び再生します。
    */

    function restartVisibleVideos() {
      const previewVideos =
        document.querySelectorAll(
          ".preview-video"
        );

      previewVideos.forEach(video => {
        const rect =
          video.getBoundingClientRect();

        const visibleHeight =
          Math.min(
            rect.bottom,
            window.innerHeight
          ) -
          Math.max(
            rect.top,
            0
          );

        const visibleRatio =
          visibleHeight / rect.height;

        if (visibleRatio >= 0.5) {
          startPreview(
            video,
            video.cardElement
          );
        }
      });
    }

    closeButton.addEventListener(
      "click",
      closeLargeVideo
    );

    videoDialog.addEventListener(
      "click",
      event => {
        /*
          動画の外側の黒い部分を
          タップしても閉じます。
        */

        if (
          event.target === videoDialog
        ) {
          closeLargeVideo();
        }
      }
    );

    videoDialog.addEventListener(
      "cancel",
      event => {
        event.preventDefault();
        closeLargeVideo();
      }
    );

    /*
      スマホで別のアプリへ切り替えた場合、
      すべての動画を一旦停止します。
    */

    document.addEventListener(
      "visibilitychange",
      () => {
        if (document.hidden) {
          pauseAllPreviewVideos();
          largeVideo.pause();
        } else if (!videoDialog.open) {
          restartVisibleVideos();
        }
      }
    );
  </script>

</body>
</html>
